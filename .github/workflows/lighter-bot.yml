name: Lighter Portfolio Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output in Discord'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: lighter-${{ github.run_id }}
          restore-keys: lighter-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        run: |
          ARGS=""
          if [ "true" = "true" ] || [ "${{ github.event.inputs.debug }}" = "true" ]; then
            ARGS="--debug"
          fi
          python bot.py $ARGS
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
